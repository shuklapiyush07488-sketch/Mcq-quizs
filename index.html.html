        const opts = card.querySelectorAll('.opt');
        opts.forEach(opt => opt.classList.remove('opt-correct', 'opt-wrong'));
        const fbDiv = card.querySelector('.fb');
        if(selected === null) {
            fbDiv.innerHTML = '⚡ Not answered';
            fbDiv.className = 'fb';
            return;
        }
        if(selected === correctIdx) {
            opts[selected].classList.add('opt-correct');
            fbDiv.innerHTML = `✅ Correct! Answer: ${String.fromCharCode(65+correctIdx)}) ${q.options[correctIdx]}`;
            fbDiv.className = 'fb fb-correct';
        } else {
            opts[selected].classList.add('opt-wrong');
            opts[correctIdx].classList.add('opt-correct');
            fbDiv.innerHTML = `❌ Wrong. Correct: ${String.fromCharCode(65+correctIdx)}) ${q.options[correctIdx]}`;
            fbDiv.className = 'fb fb-wrong';
        }
    }

    function renderPage() {
        const start = currentPage * perPage;
        const end = Math.min(start + perPage, questions.length);
        const container = document.getElementById('questionsRoot');
        container.innerHTML = '';
        for(let i=start; i<end; i++) {
            const q = questions[i];
            const selected = userAnswers[i];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `<div class="q-text">${i+1}. ${q.text}</div><div class="options"></div><div class="fb">⚡ Not answered</div>`;
            container.appendChild(card);
            const optsDiv = card.querySelector('.options');
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65+optIdx);
                const optDiv = document.createElement('div');
                optDiv.className = 'opt';
                optDiv.innerHTML = `<span class="prefix">${letter}</span><span class="opt-text">${opt}</span>`;
                optDiv.addEventListener('click', () => {
                    userAnswers[i] = optIdx;
                    applyFeedback(card, i, optIdx);
                    updateStats();
                });
                optsDiv.appendChild(optDiv);
            });
            if(selected !== null) applyFeedback(card, i, selected);
        }
        const totalPages = Math.ceil(questions.length / perPage);
        document.getElementById('pageIndicator').innerHTML = `Page ${currentPage+1} of ${totalPages}`;
        updateStats();
    }

    function resetAll() { userAnswers.fill(null); renderPage(); updateStats(); }
    document.getElementById('prevBtn').onclick = () => { if(currentPage > 0) { currentPage--; renderPage(); } };
    document.getElementById('nextBtn').onclick = () => { if((currentPage+1)*perPage < questions.length) { currentPage++; renderPage(); } };
    document.getElementById('resetBtn').onclick = resetAll;
    document.getElementById('perPageSelect').onchange = (e) => { perPage = parseInt(e.target.value); currentPage = 0; renderPage(); };
    renderPage();
</script>
</body>
</html>
